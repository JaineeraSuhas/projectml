version: '3.8'

services:
  idcfss-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idcfss-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8000
      - ALLOWED_ORIGINS=*
      - SESSION_TIMEOUT=3600
      - MAX_SESSIONS=100
      - MAX_ROWS=100000
      - MAX_FILE_SIZE=100
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - idcfss-network

networks:
  idcfss-network:
    driver: bridge
